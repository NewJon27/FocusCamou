<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 320px;
    background: #ececec;
    color: #1a1a1a;
    font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    padding: 20px;
    user-select: none;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .title-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .logo {
    width: 30px;
    height: 30px;
    background: #111;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: #fff;
  }

  .title {
    font-size: 15px;
    font-weight: 600;
    color: #111;
  }

  .version {
    font-size: 11px;
    color: #666;
  }

  .toggle-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
  }

  .big-btn {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s, box-shadow 0.3s;
    outline: none;
  }

  .big-btn.off {
    background: radial-gradient(circle at 50% 50%, #f7fbff 0%, #dbe6ef 65%, #b8c5d1 100%);
    box-shadow: 0 0 0 2px #aebbc7, 0 0 24px rgba(125, 155, 185, 0.18);
  }

  .big-btn.on {
    background: radial-gradient(circle at 50% 50%, #eef9ff 0%, #8fd4ff 68%, #3484f0 100%);
    box-shadow: 0 0 0 2px #4e98ff, 0 0 32px rgba(78, 152, 255, 0.28);
  }

  .big-btn:active { transform: scale(0.95); }

  .big-btn .btn-icon {
    font-size: 36px;
    display: block;
    line-height: 1;
  }

  .big-btn .btn-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.7;
  }

  .big-btn.on .btn-label { opacity: 1; }

  .big-btn-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6b6b6b;
    margin-bottom: 8px;
  }

  .features { margin-bottom: 4px; }

  .feature-row {
    display: flex;
    align-items: center;
    padding: 9px 0;
    margin-bottom: 8px;
    gap: 12px;
    transition: background 0.15s;
  }

  .mode-only-row {
    justify-content: space-between;
  }

  .feat-info { flex: 1; }

  .feat-name {
    font-size: 13px;
    color: #222;
    font-weight: 500;
  }

  .feat-desc {
    font-size: 11px;
    color: #6b6b6b;
    margin-top: 1px;
  }

  .mode-toggle {
    display: flex;
    background: #e7e7e7;
    border-radius: 6px;
    padding: 2px;
    gap: 2px;
    flex-shrink: 0;
  }

  .mode-btn {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    color: #666;
    background: transparent;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .mode-btn.active {
    background: #111;
    color: #f5f5f5;
  }

  .feat-switch {
    width: 32px;
    height: 18px;
    background: #cfcfcf;
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
    border: none;
  }

  .feat-switch.on { background: #111; }

  .feat-switch::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.2s, background 0.2s;
  }

  .feat-switch.on::after {
    transform: translateX(14px);
    background: #fff;
  }

  .divider {
    height: 1px;
    background: #d7d7d7;
    margin: 14px 0;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">AH</div>
  <div>
    <div class="title-row">
      <div class="title">FocusCamou</div>
      <div class="version">v3.0</div>
    </div>
  </div>
</div>

<div class="toggle-wrap">
  <button class="big-btn off" id="mainBtn">
    <div class="big-btn-inner">
      <span class="btn-icon" id="btnIcon">⏻</span>
      <span class="btn-label" id="btnLabel">OFF</span>
    </div>
  </button>
</div>

<div class="divider"></div>

<div class="features">
  <div class="section-label">功能模块</div>

  <div class="feature-row mode-only-row">
    <div class="feat-info">
      <div class="feat-name">Visibility 检测</div>
      <div class="feat-desc">visibilityState / hidden</div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" data-feat="visibility" data-mode="block">屏蔽</button>
      <button class="mode-btn" data-feat="visibility" data-mode="spoof">伪装</button>
    </div>
  </div>

  <div class="feature-row mode-only-row">
    <div class="feat-info">
      <div class="feat-name">Focus / Blur 事件</div>
      <div class="feat-desc">window blur & focus</div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" data-feat="focus" data-mode="block">屏蔽</button>
      <button class="mode-btn" data-feat="focus" data-mode="spoof">伪装</button>
    </div>
  </div>

  <div class="feature-row">
    <div class="feat-info">
      <div class="feat-name">鼠标活动模拟</div>
      <div class="feat-desc">贝塞尔曲线轨迹</div>
    </div>
    <div style="width: 62px;"></div>
    <button class="feat-switch on" data-feat="mouse"></button>
  </div>

  <div class="feature-row">
    <div class="feat-info">
      <div class="feat-name">网络上报拦截</div>
      <div class="feat-desc">fetch / XHR</div>
    </div>
    <div style="width: 62px;"></div>
    <button class="feat-switch on" data-feat="network"></button>
  </div>

  <div class="feature-row">
    <div class="feat-info">
      <div class="feat-name">WindowSwitch 库</div>
      <div class="feat-desc">劫持回调永远返回 show</div>
    </div>
    <div style="width: 62px;"></div>
    <button class="feat-switch on" data-feat="windowswitch"></button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
